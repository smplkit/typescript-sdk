# Auto-rebase ``regen/*`` PRs whenever main moves, so the auto-merge
# enabled by ``smplkit/.github/actions/update-sdk`` can actually fire.
#
# GitHub's auto-merge waits indefinitely when a PR is ``behind`` and
# the base branch has ``required_status_checks.strict_required_status_checks_policy``
# turned on (org ruleset 14668505 â€” deliberate, to catch semantic
# merge conflicts on human PRs). The composite action sets up auto-
# merge + approval correctly, but doesn't keep the branch up to date
# as main advances. This workflow closes that loop:
#
#   1. On every push to main, list open ``regen/*`` PRs whose
#      ``mergeStateStatus`` is ``BEHIND``.
#   2. Rebase each via ``gh pr update-branch``.
#   3. Re-approve (the rebase push dismisses the original auto-approval
#      because the org ruleset has ``dismiss_stale_reviews_on_push=true``).
#   4. Auto-merge â€” still enabled from the composite action â€” fires when
#      CI re-runs green against the new tip of main.
#
# If a rebase happens to fail CI (e.g. a semantic conflict the strict
# policy is designed to catch), the auto-merge stays parked and you
# get a real failure signal instead of a silent stall.
name: Auto-update behind regen PRs

on:
  push:
    branches: [main]

permissions: {}

jobs:
  rebase-stale-regens:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_PRIVATE_KEY }}

      - name: Rebase + re-approve any behind regen/* PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # ``mergeStateStatus`` is recomputed asynchronously after a
          # push to main; give GitHub a few seconds to settle.
          sleep 10

          mapfile -t behind < <(
            gh pr list --state open --limit 100 --repo "$REPO" \
              --json number,headRefName,mergeStateStatus \
              --jq '.[]
                    | select(.headRefName | startswith("regen/"))
                    | select(.mergeStateStatus == "BEHIND")
                    | .number'
          )

          if [ "${#behind[@]}" -eq 0 ]; then
            echo "No behind regen PRs to update."
            exit 0
          fi

          for pr in "${behind[@]}"; do
            echo "==> PR #$pr"
            if gh pr update-branch "$pr" --repo "$REPO"; then
              # ``dismiss_stale_reviews_on_push`` (org ruleset 14668505)
              # dismisses the original auto-approval on this push. Re-
              # approve so the still-enabled auto-merge can proceed once
              # CI re-runs green.
              gh pr review "$pr" --repo "$REPO" --approve \
                --body "Auto-approving rebase by auto-update-regen-prs workflow." \
                || echo "  Re-approve failed for #$pr (auto-merge will block until reviewed)"
            else
              echo "  update-branch failed for #$pr â€” leaving for next push"
            fi
          done
